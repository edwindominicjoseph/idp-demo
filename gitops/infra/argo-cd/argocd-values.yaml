# ─────────────────────────────────────────────────────────────────────────────
# Argo CD Helm values — single-node homelab tuned
# ─────────────────────────────────────────────────────────────────────────────

global:
  # Allow Argo CD to manage resources in staging and prod namespaces
  additionalLabels: {}

server:
  # ── Service ───────────────────────────────────────────────────────────────
  service:
    type: NodePort            # Access via port-forward or NodePort for setup

  # ── Resource limits ───────────────────────────────────────────────────────
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # ── Insecure mode (no TLS internally — Tailscale handles TLS externally) ──
  extraArgs:
    - --insecure

repoServer:
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

applicationSet:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

notifications:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

controller:
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

redis:
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── RBAC — allow Argo CD to deploy to staging and prod namespaces ────────────
configs:
  params:
    server.insecure: true
  rbac:
    policy.default: role:readonly
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      g, admin, role:admin