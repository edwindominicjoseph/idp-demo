controller:
  # ── Admin credentials ────────────────────────────────────────────────────
  admin:
    username: "admin"
    password: "changeme"          # Override via --set or a sealed secret

  # ── Resource limits (single-node homelab tuned) ───────────────────────────
  resources:
    requests:
      cpu: "300m"
      memory: "768Mi"
    limits:
      cpu: "1"
      memory: "1.5Gi"

  # ── JVM tuning (matched to memory limit) ─────────────────────────────────
  javaOpts: "-Xms384m -Xmx1024m"

  # ── Service type (NodePort — accessible at 46.62.207.133:30782) ─────────
  serviceType: NodePort
  nodePort: 30782

  # ── Plugins ──────────────────────────────────────────────────────────────
  installPlugins:
    - kubernetes:latest
    - kubernetes-credentials:latest
    - workflow-aggregator:latest
    - git:latest
    - github:latest
    - pipeline-github-lib:latest
    - credentials-binding:latest
    - prometheus:latest
    - job-dsl:latest

  # ── Kubernetes Plugin global config + pipeline jobs (JCasC) ──────────────
  JCasC:
    configScripts:

      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default.svc"
                namespace: "jenkins"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                connectTimeout: 5
                readTimeout: 15
                containerCapStr: "3"              # max 3 concurrent builds on single node
                podRetention: "never"
                templates:
                  - name: "homelab-agent"
                    namespace: "jenkins"
                    label: "homelab-agent"
                    activeDeadlineSeconds: 1800   # 30 min hard cap — no orphaned pods
                    podRetention: "never"
                    containers:
                      - name: "tools"
                        image: "alpine/k8s:1.29.2"
                        command: "sleep"
                        args: "99d"
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "128Mi"
                        resourceLimitCpu: "300m"
                        resourceLimitMemory: "256Mi"
                    serviceAccount: "jenkins"
                    volumes:
                      - emptyDirVolume:
                          mountPath: "/tmp"
                          memory: false

      pipelines: |
        jobs:
          - script: >
              pipelineJob('homelab-staging') {
                description('Staging deploy — triggered by GitHub Actions on push to develop')
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/edwindominicjoseph/idp-demo.git')
                          credentials('github-token')
                        }
                        branch('*/develop')
                      }
                    }
                    scriptPath('jenkinsfiles/Jenkinsfile.staging')
                    lightweight(true)
                  }
                }
              }
          - script: >
              pipelineJob('homelab-prod') {
                description('Prod deploy — triggered by GitHub Actions on push to main, requires manual approval')
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url('https://github.com/edwindominicjoseph/idp-demo.git')
                          credentials('github-token')
                        }
                        branch('*/main')
                      }
                    }
                    scriptPath('jenkinsfiles/Jenkinsfile.prod')
                    lightweight(true)
                  }
                }
              }

# ── Agent service (JNLP port) ────────────────────────────────────────────────
agent:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Persistence ───────────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: "5Gi"
  storageClass: ""                   # Uses cluster default StorageClass

# ── RBAC — Jenkins service account needs to create/delete pods ───────────────
rbac:
  create: true

serviceAccount:
  create: true
  name: "jenkins"
