controller:
  # ── Admin credentials ────────────────────────────────────────────────────
  adminUser: "admin"
  adminPassword: "changeme"          # Override via --set or a sealed secret

  # ── Resource limits (single-node homelab tuned) ───────────────────────────
  resources:
    requests:
      cpu: "300m"
      memory: "768Mi"
    limits:
      cpu: "1"
      memory: "1.5Gi"

  # ── JVM tuning (matched to memory limit) ─────────────────────────────────
  javaOpts: "-Xms384m -Xmx1024m"

  # ── Service type (ClusterIP — access via kubectl port-forward or ingress) ─
  serviceType: ClusterIP

  # ── Plugins ──────────────────────────────────────────────────────────────
  installPlugins:
    - kubernetes:4296.v42087c6c91d5
    - kubernetes-credentials:0.12.1
    - workflow-aggregator:600.vb_57cdd26fdd7
    - git:5.7.0
    - github:1.40.0
    - pipeline-github-lib:61.v629f2cc41d83
    - credentials-binding:681.vf91669a_32e45
    - prometheus:793.v0a_4c00e5aff5

  # ── Kubernetes Plugin global config (JCasC) ───────────────────────────────
  JCasC:
    configScripts:
      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default.svc"
                namespace: "jenkins"
                jenkinsTunnel: "jenkins-agent.jenkins.svc.cluster.local:50000"
                jenkinsUrl: "http://jenkins.jenkins.svc.cluster.local:8080"
                connectTimeout: 5
                readTimeout: 15
                containerCapStr: "3"              # max 3 concurrent builds on single node
                podRetention: "never"
                templates:
                  - name: "homelab-agent"
                    namespace: "jenkins"
                    label: "homelab-agent"
                    activeDeadlineSeconds: 1800   # 30 min hard cap — no orphaned pods
                    podRetention: "never"
                    containers:
                      # ── kubectl ──────────────────────────────────────────
                      # Needed for: cluster inspection during pipelines
                      - name: "kubectl"
                        image: "bitnami/kubectl:latest"
                        command: "sleep"
                        args: "99d"
                        resourceRequestCpu: "50m"
                        resourceRequestMemory: "64Mi"
                        resourceLimitCpu: "200m"
                        resourceLimitMemory: "128Mi"

                      # ── argocd CLI ───────────────────────────────────────
                      # Needed for: argocd app sync + app wait in all pipelines
                      - name: "argocd"
                        image: "argoproj/argocd:latest"
                        command: "sleep"
                        args: "99d"
                        resourceRequestCpu: "50m"
                        resourceRequestMemory: "64Mi"
                        resourceLimitCpu: "200m"
                        resourceLimitMemory: "128Mi"

                      # ── curl ─────────────────────────────────────────────
                      # Needed for: smoke tests, Prometheus polling, GitHub status API
                      - name: "curl"
                        image: "curlimages/curl:latest"
                        command: "sleep"
                        args: "99d"
                        resourceRequestCpu: "25m"
                        resourceRequestMemory: "32Mi"
                        resourceLimitCpu: "100m"
                        resourceLimitMemory: "64Mi"

                      # ── maven (Java 17) ───────────────────────────────────
                      # Needed for: ServiceComb Java builds (CHG-006 prerequisite validation)
                      # Note: image builds happen in GitHub Actions — not here
                      - name: "maven"
                        image: "maven:3.9-eclipse-temurin-17"
                        command: "sleep"
                        args: "99d"
                        resourceRequestCpu: "200m"
                        resourceRequestMemory: "512Mi"
                        resourceLimitCpu: "1"
                        resourceLimitMemory: "1Gi"
                        envVars:
                          - envVar:
                              key: "MAVEN_OPTS"
                              value: "-Xms128m -Xmx768m"

                      # ── docker (DinD) ─────────────────────────────────────
                      # Kept minimal — image builds are owned by GitHub Actions.
                      # Only used here if a pipeline needs to inspect or re-tag an image.
                      - name: "docker"
                        image: "docker:dind"
                        command: "dockerd-entrypoint.sh"
                        args: ""
                        privileged: true
                        resourceRequestCpu: "100m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "500m"
                        resourceLimitMemory: "512Mi"

                    serviceAccount: "jenkins"
                    volumes:
                      - emptyDirVolume:
                          mountPath: "/tmp"
                          memory: false

# ── Agent service (JNLP port) ────────────────────────────────────────────────
agent:
  enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Persistence ───────────────────────────────────────────────────────────────
persistence:
  enabled: true
  size: "5Gi"                        # Reduced from 10Gi — sufficient for homelab
  storageClass: ""                   # Uses cluster default StorageClass

# ── RBAC — Jenkins service account needs to create/delete pods ───────────────
rbac:
  create: true

serviceAccount:
  create: true
  name: "jenkins"
